name: Buildroot BusyBox QEMU CI

on: [push, pull_request, workflow_dispatch]

jobs:
  build-busybox-qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Buildroot
        uses: actions/checkout@v4
        with:
          repository: 'buildroot/buildroot'
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gettext libncurses5-dev \
            file wget cpio python3 unzip rsync qemu-system-arm qemu-system-x86

      - name: Load Default Config
        run: make qemu_aarch64_virt_defconfig

      # 這裡我們用 sed 確保 Init 系統是 BusyBox (雖然預設就是，但這樣改最保險)
      - name: Force BusyBox Init
        run: |
          sed -i 's/BR2_INIT_SYSTEMD=y/# BR2_INIT_SYSTEMD is not set/' .config
          sed -i 's/# BR2_INIT_BUSYBOX is not set/BR2_INIT_BUSYBOX=y/' .config
          make olddefconfig

      - name: Cache Downloads
        uses: actions/cache@v4
        with:
          path: dl/
          # 監控 .config，只要配置變了就準備新緩存，但優先讀取舊的 dl/
          key: buildroot-dl-${{ hashFiles('.config') }}
          restore-keys: |
            buildroot-dl-

      - name: Build (BusyBox Mode)
        run: make -j$(nproc)

      - name: Run Test and Check Init
        run: |
          # 啟動 QEMU 並確認進程 1 是不是 busybox init
          ./output/images/start-qemu.sh serial-only <<EOF
          root
          ps -p 1
          uname -a
          poweroff
          EOF

      - name: Upload BusyBox Images
        uses: actions/upload-artifact@v4
        with:
          name: busybox-qemu-dist
          path: |
            output/images/Image
            output/images/rootfs.ext2
            output/images/start-qemu.sh

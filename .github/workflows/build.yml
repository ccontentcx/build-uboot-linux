name: Build U-Boot and Linux for QEMU
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf make bison flex libssl-dev libncurses5-dev bc qemu-system-arm

      - name: Build U-Boot
        run: |
          git clone --depth 1 https://github.com
          cd u-boot
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- vexpress_ca9x4_defconfig
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j$(nproc)
          cp u-boot ../u-boot-bin

      - name: Build Linux Kernel
        run: |
          git clone --depth 1 https://git.kernel.org
          cd linux
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- vexpress_defconfig
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- zImage dtbs -j$(nproc)
          cp arch/arm/boot/zImage ../zImage
          cp arch/arm/boot/dts/vexpress-v2p-ca9.dtb ../vexpress.dtb

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-images
          path: |
            u-boot-bin
            zImage
            vexpress.dtb

name: Build U-Boot and Linux for QEMU

on: [push, pull_request, workflow_dispatch]

jobs:
  build-qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Buildroot
        uses: actions/checkout@v4
        with:
          repository: 'buildroot/buildroot'
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gettext libncurses5-dev \
            file wget cpio python3 unzip rsync qemu-system-arm

      - name: Cache Downloads
        uses: actions/cache@v4
        with:
          path: dl/
          key: buildroot-dl-${{ hashFiles('Config.in') }}

      - name: Configure Buildroot
        run: make qemu_aarch64_virt_defconfig

      - name: Build
        # 使用 nproc 跑滿 CPU，但預留 1 核避免系統鎖死
        run: make -j$(nproc)

      - name: Run Test in QEMU
        run: |
          # 使用 expect 或簡單腳本模擬自動啟動與關機
          # 這裡示範啟動後等待 login 出現，並執行 uname -a 後關機
          ./output/images/start-qemu.sh serial-only <<EOF
          root
          uname -a
          poweroff
          EOF

      - name: Upload Build Images
        uses: [actions/upload-artifact](https://github.com)@v4
        with:
          name: buildroot-qemu-images
          path: |
            output/images/Image
            output/images/rootfs.ext2
            output/images/start-qemu.sh

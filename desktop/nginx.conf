
#user  nobody;
worker_processes  1;

error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;
env TZ=Asia/Shanghai;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    server {
        listen       8001;
        server_name  localhost;
        listen 127.0.0.1:8002;

        #charset koi8-r;

        #access_log  logs/host.access.log  main;

        location / {
            root   html;
            index  index.html index.htm;
        }

        location /photos/ {
        alias D:/主图1片/学车/;
        autoindex on;
        charset utf-8;
        autoindex_localtime on; 
        add_header Access-Control-Allow-Origin *;
        }

        location /photos_json/ {
        alias D:/主图1片/学车/;
        autoindex on;
        charset utf-8;
        autoindex_localtime on; 
        add_header Access-Control-Allow-Origin *;
        autoindex_format json;
        }

        location /download/ {
        alias D:/flutter_project/flutter_application_2/build/app/outputs/flutter-apk/; # 文件在服务器上的真实路径
        
        # 开启目录浏览功能（核心）
        autoindex on;             
        # 显示文件的确切大小（单位是 bytes），设为 off 则显示 KB/MB/GB
        autoindex_exact_size off; 
        # 显示文件修改时间为本地时间
        autoindex_localtime on;   
        
        # 强制浏览器下载而不是直接打开（比如 txt、pdf、图片）
        add_header Content-Disposition "attachment";
        limit_rate 10240k;
        }

        
        location /api/test {
        default_type application/json;
        add_header 'Access-Control-Allow-Origin' 'http://127.0.0.1:8551' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # 必须处理 OPTIONS 请求
        if ($request_method = 'OPTIONS') {
        return 204;
        }
        return 200 '{"code":200,"message":"POST success"}';
        }

        error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
        

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }


    # another virtual host using mix of IP-, name-, and port-based configuration
